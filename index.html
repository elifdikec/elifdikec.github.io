<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elif Dikeç</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter, sans-serif;
  background:white;
  color:#222;
  line-height:1.6;
}

header{
  border-bottom:1px solid #eee;
  padding:24px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

nav a{
  margin-left:24px;
  text-decoration:none;
  color:#555;
  font-size:14px;
  letter-spacing:0.1em;
  text-transform:uppercase;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:60px 20px;
}

.hero{
  display:grid;
  grid-template-columns:320px 1fr;
  gap:60px;
  align-items:center;
  padding-top:40px;
}

.hero-content{
  max-width:420px;
}

.hero-role{
  margin-top:14px;
  font-size:16px;
  color:#555;
}


.hero img{
  width:100%;
  max-width:300px;
  border-radius:16px;
}

.hero-meta{
  margin-top:14px;
  text-align:center;
  color:#666;
  font-size:14px;
  letter-spacing:.05em;
}

.photo-credit{
  font-size:12px;
  color:#666;
  margin-top:6px;
}

h1{
  font-weight:300;
  font-size:42px;
  margin:0;
}

.subtitle{
  margin-top:10px;
  color:#666;
}

.section-title{
  font-size:22px;
  letter-spacing:0.2em;
  text-transform:uppercase;
  margin-bottom:40px;
}

.works-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:40px;
}

.work{
  position:relative;
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
  background:#f4f4f4;
}

.work img{
  width:100%;
  display:block;
}

.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.6);
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  padding:20px;
  opacity:0;
  transition:opacity .3s;
}

.work:hover .overlay{
  opacity:1;
}

.quote{
  max-width:700px;
  margin:80px auto 60px auto;
  text-align:center;
  font-size:16px;
  font-weight:300;
  color:#555;
}

.quote small{
  display:block;
  margin-top:20px;
  color:#777;
}

.about{
  display:grid;
  grid-template-columns:0.8fr 1.2fr;
  gap:60px;
}

.about img{
  width:100%;
  border-radius:16px;
}

.contact a{
  display:block;
  margin-bottom:10px;
  color:#333;
  text-decoration:none;
}

iframe{
  border:none;
  width:100%;
  height:380px;
  margin-top:20px;
}

.player{
  margin-top:40px;
}

</style>
</head>

<body>

<header>
<div>
<div style="letter-spacing:.25em;text-transform:uppercase">Elif Dikeç</div>
<div class="subtitle">Musician</div>
</div>

<nav>
<a href="works.html">Works</a>
<a href="about.html">About</a>
<a href="#contact">Contact</a>
</nav>
</header>

<div class="container hero">

<div>
<img src="images/elif-live.jpg">
<div class="photo-credit">Photo: Ahmet Emre Saka</div>
</div>

<div class="hero-content">
<h1>Elif Dikeç</h1>
<div class="hero-role">Keys, Arranger, Composer</div>
</div>

</div>

<div class="container contact" id="contact">

<div class="section-title">Contact</div>

<a href="mailto:elifdikec@gmail.com">Email</a>
<a href="https://www.instagram.com/paranoidbattledroid/" target="_blank">IG</a>

</div>



<script>
</script>

</body>
</html>
